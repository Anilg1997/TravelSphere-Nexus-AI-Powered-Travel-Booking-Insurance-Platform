<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="cardShadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="750" fill="url(#bgGrad)"/>
  <rect x="350" y="120" rx="24" ry="24" width="400" height="480" fill="white" filter="url(#cardShadow)"/>
  <text x="550" y="178" fill="#3f51b5" font-size="24" font-weight="800" text-anchor="middle">🌍 TravelSphere</text>
  <text x="550" y="204" fill="#666" font-size="13" text-anchor="middle">Welcome back! Sign in to continue</text>

  <!-- Email field -->
  <rect x="380" y="230" rx="8" ry="8" width="340" height="56" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="396" y="252" fill="#666" font-size="10" font-weight="500">Email</text>
  <text x="396" y="272" fill="#333" font-size="14">anil@example.com</text>

  <!-- Password field -->
  <rect x="380" y="300" rx="8" ry="8" width="340" height="56" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="396" y="322" fill="#666" font-size="10" font-weight="500">Password</text>
  <text x="396" y="342" fill="#333" font-size="14">••••••••</text>
  <rect x="690" y="318" rx="4" ry="4" width="16" height="16" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="695" y="331" fill="#ccc" font-size="10">👁</text>

  <!-- Sign In button -->
  <rect x="380" y="380" rx="24" ry="24" width="340" height="44" fill="#3f51b5"/>
  <text x="550" y="408" fill="white" font-size="14" font-weight="600" text-anchor="middle">Sign In</text>

  <!-- Auth footer -->
  <text x="550" y="454" fill="#666" font-size="12" text-anchor="middle">Don't have an account?</text>
  <text x="550" y="478" fill="#3f51b5" font-size="13" font-weight="600" text-anchor="middle" text-decoration="underline">Create Account</text>
</svg>
