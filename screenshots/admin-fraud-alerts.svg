  <rect x="272" y="260" width="880" height="80" rx="12" fill="white"/>
  <rect x="276" y="260" width="4" height="80" rx="2" fill="#e65100"/>
  <rect x="295" y="273" width="50" height="22" rx="11" fill="#fff3e0"/><text x="303" y="288" font-size="11" fill="#e65100">High</text>
  <text x="370" y="288" font-size="13" font-weight="bold" fill="#333">Suspicious Login Location</text>
  <text x="370" y="308" font-size="12" fill="#666">User #4531 logged in from 3 different countries in 1 hour</text>
  <text x="370" y="326" font-size="11" fill="#999">15 min ago · IP: 78.x.x.12</text>
  <rect x="830" y="295" width="100" height="34" rx="17" fill="#3f51b5"/><text x="855" y="317" fill="white" font-size="12" font-weight="bold">Investigate</text>
  <rect x="940" y="295" width="80" height="34" rx="17" fill="#e0e0e0"/><text x="960" y="317" fill="#555" font-size="12">Dismiss</text>
  <line x1="272" y1="340" x2="1152" y2="340" stroke="#eee"/>
  <rect x="272" y="345" width="880" height="80" rx="12" fill="white"/>
  <rect x="276" y="345" width="4" height="80" rx="2" fill="#f9a825"/>
  <rect x="295" y="358" width="60" height="22" rx="11" fill="#fff8e1"/><text x="305" y="373" font-size="11" fill="#f9a825">Medium</text>
  <text x="370" y="378" font-size="13" font-weight="bold" fill="#333">Rapid Booking Cancellation</text>
  <text x="370" y="398" font-size="12" fill="#666">User #2211 booked and cancelled 8 flights in 30 min</text>
  <text x="370" y="416" font-size="11" fill="#999">1h ago · Device: Unknown</text>
  <rect x="830" y="380" width="100" height="34" rx="17" fill="#3f51b5"/><text x="855" y="402" fill="white" font-size="12" font-weight="bold">Investigate</text>
  <rect x="940" y="380" width="80" height="34" rx="17" fill="#e0e0e0"/><text x="960" y="402" fill="#555" font-size="12">Dismiss</text>
</svg>
