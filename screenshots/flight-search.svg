  <rect x="800" y="406" rx="12" ry="12" width="60" height="24" fill="#e8eaf6"/>
  <text x="810" y="422" fill="#3f51b5" font-size="10" font-weight="600">Any</text>

  <!-- Flight Results -->
  <rect x="40" y="376" rx="16" ry="16" width="710" height="90" fill="white" filter="url(#shadow1)"/>
  <text x="60" y="405" font-size="14" font-weight="600" fill="#1a1a2e">✈  IndiGo · 6E-123</text>
  <text x="60" y="424" fill="#666" font-size="11">Jun 20, 10:30 AM — Jun 20, 1:15 PM</text>
  <text x="60" y="444" fill="#888" font-size="11">165 min · Airbus A320neo</text>
  <text x="620" y="405" font-size="22" font-weight="700" fill="#3f51b5">₹4,599</text>
  <rect x="660" y="410" rx="10" ry="10" width="70" height="20" fill="#e8f5e9"/>
  <text x="665" y="424" fill="#2e7d32" font-size="9" font-weight="600">8 seats left</text>

  <rect x="40" y="482" rx="16" ry="16" width="710" height="90" fill="white" filter="url(#shadow1)"/>
  <text x="60" y="511" font-size="14" font-weight="600" fill="#1a1a2e">✈  SpiceJet · SG-8157</text>
  <text x="60" y="530" fill="#666" font-size="11">Jun 20, 2:45 PM — Jun 20, 5:00 PM</text>
  <text x="60" y="550" fill="#888" font-size="11">135 min · Boeing 737-800</text>
  <text x="620" y="511" font-size="22" font-weight="700" fill="#3f51b5">₹3,299</text>
  <rect x="660" y="516" rx="10" ry="10" width="70" height="20" fill="#e8f5e9"/>
  <text x="665" y="530" fill="#2e7d32" font-size="9" font-weight="600">15 seats left</text>

  <rect x="40" y="588" rx="16" ry="16" width="710" height="90" fill="white" filter="url(#shadow1)"/>
  <text x="60" y="617" font-size="14" font-weight="600" fill="#1a1a2e">✈  Vistara · UK-997</text>
  <text x="60" y="636" fill="#666" font-size="11">Jun 20, 7:00 AM — Jun 20, 9:30 AM</text>
  <text x="60" y="656" fill="#888" font-size="11">150 min · Airbus A320</text>
  <text x="620" y="617" font-size="22" font-weight="700" fill="#3f51b5">₹5,999</text>
  <rect x="660" y="622" rx="10" ry="10" width="70" height="20" fill="#e8f5e9"/>
  <text x="665" y="636" fill="#2e7d32" font-size="9" font-weight="600">5 seats left</text>
