server:
  port: 8094

spring:
  application:
    name: ai-agent-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:travelsphere}?currentSchema=search_schema
    username: ${POSTGRES_USER:travelsphere}
    password: ${POSTGRES_PASSWORD:TravelSphere@2024}
  jpa:
    properties:
      hibernate:
        default_schema: search_schema
  flyway:
    schemas: search_schema
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:Redis@2024}
  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ai-agent-service-group
    topic:
      query-logged: ts.ai.query-logged
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3.2}
        options:
          temperature: 0.7
          num-predict: 1024
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

app:
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6333}
    collection: travelsphere_knowledge
    vector-size: 768
  rag:
    chunk-size: 500
    chunk-overlap: 50
    top-k: 5
    min-score: 0.7
  chat:
    max-history: 10
