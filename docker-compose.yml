  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: travelsphere-notification-service
    networks:
      - travelsphere-net
    ports:
      - "8091:8091"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      REDIS_HOST: redis
