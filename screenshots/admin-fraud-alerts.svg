  <text x="272" y="40" font-size="24" font-weight="bold" fill="#1a1a2e">Fraud Alerts</text><text x="272" y="60" font-size="12" fill="#888">Detect and investigate suspicious activity</text>
  <!-- Summary Cards -->
  <rect x="272" y="80" width="210" height="80" rx="12" fill="white"/>
  <circle cx="300" cy="115" r="16" fill="#ffebee"/><text x="295" y="121" fill="#c62828" font-size="16">⚠</text>
  <text x="330" y="112" font-size="24" font-weight="bold" fill="#c62828">3</text><text x="330" y="132" font-size="11" fill="#888">Critical</text>
  <rect x="498" y="80" width="210" height="80" rx="12" fill="white"/>
  <circle cx="526" cy="115" r="16" fill="#fff3e0"/><text x="521" y="121" fill="#e65100" font-size="16">⚡</text>
  <text x="556" y="112" font-size="24" font-weight="bold" fill="#e65100">7</text><text x="556" y="132" font-size="11" fill="#888">High</text>
  <rect x="724" y="80" width="210" height="80" rx="12" fill="white"/>
  <circle cx="752" cy="115" r="16" fill="#fff8e1"/><text x="747" y="121" fill="#f9a825" font-size="16">!</text>
  <text x="782" y="112" font-size="24" font-weight="bold" fill="#f9a825">12</text><text x="782" y="132" font-size="11" fill="#888">Medium</text>
  <rect x="950" y="80" width="202" height="80" rx="12" fill="white"/>
  <circle cx="978" cy="115" r="16" fill="#e8f5e9"/><text x="973" y="121" fill="#2e7d32" font-size="16">✓</text>
  <text x="1008" y="112" font-size="24" font-weight="bold" fill="#2e7d32">18</text><text x="1008" y="132" font-size="11" fill="#888">Resolved</text>
