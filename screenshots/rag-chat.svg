  <rect x="72" y="120" width="400" height="80" rx="16" fill="#f0f2f5"/>
  <text x="84" y="142" font-size="11" font-weight="bold" fill="#1a1a2e">TravelSphere AI</text>
  <text x="84" y="162" font-size="13" fill="#333">Hello! I'm your AI travel assistant. I can help with destinations, itineraries, and more!</text>
  
  <rect x="500" y="216" width="400" height="60" rx="16" fill="#3f51b5"/>
  <text x="512" y="238" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.8)">You</text>
  <text x="512" y="258" font-size="13" fill="white">What are the best beaches in Goa?</text>

  <rect x="72" y="292" width="500" height="140" rx="16" fill="#e8f5e9"/>
  <text x="84" y="314" font-size="11" font-weight="bold" fill="#2e7d32">TravelSphere AI (RAG-Enhanced)</text>
  <text x="84" y="336" font-size="13" fill="#333">Based on our travel knowledge base, here are the best beaches in Goa:</text>
  <text x="84" y="358" font-size="13" fill="#333">🏖️ Baga Beach - Watersports & nightlife</text>
  <text x="84" y="378" font-size="13" fill="#333">🏖️ Anjuna Beach - Famous flea market</text>
  <text x="84" y="398" font-size="13" fill="#333">🏖️ Palolem Beach - Serene & picturesque</text>
  <text x="84" y="418" font-size="11" fill="#888">Source: Travel knowledge base (3 chunks retrieved)</text>

  <rect x="72" y="448" width="450" height="80" rx="16" fill="#f0f2f5"/>
  <text x="84" y="470" font-size="11" font-weight="bold" fill="#1a1a2e">TravelSphere AI</text>
  <text x="84" y="490" font-size="13" fill="#333">Would you like me to plan a full Goa itinerary or help you book hotels/flights?</text>

  <!-- Input -->
  <rect x="48" y="672" width="880" height="60" rx="30" fill="white"/>
  <text x="72" y="706" font-size="14" fill="#999">Ask about destinations, itineraries, tips...</text>
  <circle cx="870" cy="702" r="20" fill="#3f51b5"/><text x="863" y="708" fill="white" font-size="14">➤</text>

  <!-- Knowledge Base Panel -->
  <rect x="948" y="96" width="220" height="560" rx="16" fill="white"/>
