version: '3.8'

name: travelsphere

networks:
  travelsphere-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  localstack-data:
  grafana-data:
  prometheus-data:
  zipkin-data:

services:
  # ── Infrastructure Services ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: travelsphere-postgres
    networks:
      - travelsphere-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travelsphere}
      POSTGRES_USER: ${POSTGRES_USER:-travelsphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TravelSphere@2024}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travelsphere} -d ${POSTGRES_DB:-travelsphere}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: travelsphere-redis
    networks:
      - travelsphere-net
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis@2024} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: travelsphere-zookeeper
    networks:
      - travelsphere-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: travelsphere-kafka
    networks:
      - travelsphere-net
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: travelsphere-qdrant
    networks:
      - travelsphere-net
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  localstack:
    image: localstack/localstack:latest
    container_name: travelsphere-localstack
    networks:
      - travelsphere-net
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,lambda,sqs,sns,ses
      DEFAULT_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-fake-access-key}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-fake-secret-key}
      LS_LOG: warn
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Monitoring ────────────────────────────────────────────────────────────

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: travelsphere-zipkin
    networks:
      - travelsphere-net
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9411/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: travelsphere-prometheus
    networks:
      - travelsphere-net
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: travelsphere-grafana
    networks:
      - travelsphere-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: travelsphere-kafka-ui
    networks:
      - travelsphere-net
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_READONLY: "false"
    depends_on:
      kafka:
        condition: service_started

  mailhog:
    image: mailhog/mailhog:latest
    container_name: travelsphere-mailhog
    networks:
      - travelsphere-net
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── TravelSphere Microservices ───────────────────────────────────────────

  service-registry:
    build:
      context: ./backend/service-registry
      dockerfile: Dockerfile
    container_name: travelsphere-service-registry
    networks:
      - travelsphere-net
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  config-server:
    build:
      context: ./backend/config-server
      dockerfile: Dockerfile
    container_name: travelsphere-config-server
    networks:
      - travelsphere-net
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: ${CONFIG_REPO_URI:-file:///config-repo}
    volumes:
      - ./config-repo:/config-repo
    depends_on:
      service-registry:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: travelsphere-api-gateway
    networks:
      - travelsphere-net
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@2024}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      service-registry:
        condition: service_started
      config-server:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: travelsphere-auth-service
    networks:
      - travelsphere-net
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-TravelSphere_JWT_Secret_Key_Min32Chars_2024}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@2024}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TravelSphere@2024}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    depends_on:
      service-registry:
        condition: service_started
      config-server:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: travelsphere-user-service
    networks:
      - travelsphere-net
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@2024}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TravelSphere@2024}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
