<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Inter','Segoe UI',sans-serif">
  <defs><filter id="shadow1"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter></defs>
  <rect width="1100" height="750" fill="#f5f7fa"/>
  <rect width="1100" height="56" fill="#3f51b5"/>
  <text x="24" y="36" fill="white" font-size="18" font-weight="700">✈ TravelSphere</text>
