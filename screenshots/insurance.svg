  <text x="420" y="585" fill="#2e7d32" font-size="11" font-weight="600" text-anchor="middle">Basic</text>
  <rect x="530" y="564" rx="4" ry="4" width="220" height="32" fill="#fce4ec"/>
  <text x="640" y="585" fill="#c62828" font-size="11" font-weight="600" text-anchor="middle">Standard</text>
