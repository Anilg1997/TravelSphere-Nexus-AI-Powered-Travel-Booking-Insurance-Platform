  <circle cx="320" cy="680" r="4" fill="#3f51b5"/><circle cx="370" cy="620" r="4" fill="#3f51b5"/>
  <circle cx="420" cy="640" r="4" fill="#3f51b5"/><circle cx="470" cy="550" r="4" fill="#3f51b5"/>
  <circle cx="520" cy="580" r="4" fill="#3f51b5"/><circle cx="570" cy="480" r="4" fill="#3f51b5"/>
  <circle cx="620" cy="500" r="4" fill="#3f51b5"/>

  <!-- Service Distribution -->
  <rect x="742" y="400" width="390" height="350" rx="12" fill="white"/>
  <text x="770" y="430" font-size="14" font-weight="bold" fill="#1a1a2e">Service Distribution</text>
  <rect x="770" y="460" width="330" height="28" rx="14" fill="#f0f0f0"/>
  <rect x="770" y="460" width="130" height="28" rx="14" fill="#3f51b5"/><text x="920" y="478" fill="#333" font-size="11">✈ Flights: 38%</text>
  <rect x="770" y="500" width="330" height="28" rx="14" fill="#f0f0f0"/>
  <rect x="770" y="500" width="100" height="28" rx="14" fill="#ff4081"/><text x="920" y="518" fill="#333" font-size="11">🏨 Hotels: 30%</text>
  <rect x="770" y="540" width="330" height="28" rx="14" fill="#f0f0f0"/>
  <rect x="770" y="540" width="70" height="28" rx="14" fill="#4caf50"/><text x="920" y="558" fill="#333" font-size="11">🚗 Cars: 15%</text>
  <rect x="770" y="580" width="330" height="28" rx="14" fill="#f0f0f0"/>
  <rect x="770" y="580" width="50" height="28" rx="14" fill="#ff9800"/><text x="920" y="598" fill="#333" font-size="11">🛡 Insurance: 12%</text>
  <rect x="770" y="620" width="330" height="28" rx="14" fill="#f0f0f0"/>
  <rect x="770" y="620" width="40" height="28" rx="14" fill="#9c27b0"/><text x="920" y="638" fill="#333" font-size="11">🎁 Packages: 5%</text>
