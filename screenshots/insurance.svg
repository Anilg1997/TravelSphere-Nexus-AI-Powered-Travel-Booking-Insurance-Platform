  <text x="200" y="300" font-size="28" font-weight="800" fill="#3f51b5" text-anchor="middle">₹500</text>
  <text x="200" y="322" fill="#666" font-size="12" text-anchor="middle">for 7 days coverage</text>
  <text x="60" y="356" fill="#666" font-size="11" text-anchor="middle">Coverage: ₹5,00,000</text>
  <rect x="120" y="376" rx="20" ry="20" width="160" height="36" fill="#3f51b5"/>
