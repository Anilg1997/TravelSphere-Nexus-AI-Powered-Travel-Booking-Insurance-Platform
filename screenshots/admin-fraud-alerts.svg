  <rect x="272" y="175" width="880" height="80" rx="12" fill="white"/>
  <rect x="276" y="175" width="4" height="80" rx="2" fill="#c62828"/>
  <rect x="295" y="188" width="60" height="22" rx="11" fill="#ffebee"/><text x="305" y="203" font-size="11" fill="#c62828">Critical</text>
  <text x="370" y="203" font-size="13" font-weight="bold" fill="#333">Multiple Failed Payments</text>
  <text x="370" y="223" font-size="12" fill="#666">User #8172 attempted 12 payments in 5 minutes</text>
  <text x="370" y="241" font-size="11" fill="#999">7 min ago · IP: 103.x.x.45</text>
  <rect x="830" y="210" width="100" height="34" rx="17" fill="#3f51b5"/><text x="855" y="232" fill="white" font-size="12" font-weight="bold">Investigate</text>
  <rect x="940" y="210" width="80" height="34" rx="17" fill="#e0e0e0"/><text x="960" y="232" fill="#555" font-size="12">Dismiss</text>
