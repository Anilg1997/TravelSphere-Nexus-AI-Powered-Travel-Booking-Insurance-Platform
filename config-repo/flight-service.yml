server:
  port: 8083

spring:
  application:
    name: flight-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:travelsphere}?currentSchema=flight_schema
    username: ${POSTGRES_USER:travelsphere}
    password: ${POSTGRES_PASSWORD:TravelSphere@2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    properties:
      hibernate:
        default_schema: flight_schema
  flyway:
    schemas: flight_schema
    enabled: true
    locations: classpath:db/migration
  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: flight-service-group
    topic:
      flight-booked: ts.flights.booked
      flight-cancelled: ts.flights.cancelled
      flight-checked-in: ts.flights.checked-in

app:
  cache:
    flight-search-ttl: 300
