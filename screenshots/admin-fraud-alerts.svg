  <rect x="12" y="216" width="216" height="40" rx="8" fill="transparent"/><text x="36" y="241" fill="rgba(255,255,255,0.7)" font-size="14">📈 Analytics</text>
  <rect x="12" y="264" width="216" height="40" rx="8" fill="transparent"/><text x="36" y="289" fill="rgba(255,255,255,0.7)" font-size="14">🎫 Support</text>
  <rect x="12" y="312" width="216" height="40" rx="8" fill="#3f51b5"/><text x="36" y="337" fill="white" font-size="14">⚠ Fraud Alerts</text>
