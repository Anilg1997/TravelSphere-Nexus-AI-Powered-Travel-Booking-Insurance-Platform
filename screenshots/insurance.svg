  <text x="550" y="320" font-size="28" font-weight="800" fill="#3f51b5" text-anchor="middle">₹1,200</text>
  <text x="550" y="342" fill="#666" font-size="12" text-anchor="middle">for 7 days coverage</text>
  <text x="410" y="376" fill="#666" font-size="11" text-anchor="middle">Coverage: ₹10,00,000</text>
  <rect x="470" y="396" rx="20" ry="20" width="160" height="36" fill="#3f51b5"/>
  <text x="550" y="420" fill="white" font-size="12" text-anchor="middle" font-weight="600">🛒 Buy Now</text>

