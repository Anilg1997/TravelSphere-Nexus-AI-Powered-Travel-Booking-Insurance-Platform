<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#667eea"/><stop offset="100%" style="stop-color:#764ba2"/></linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#f0f2f5"/>
  <text x="48" y="48" font-size="28" font-weight="bold" fill="#1a1a2e">🤖 AI Travel Assistant</text>
