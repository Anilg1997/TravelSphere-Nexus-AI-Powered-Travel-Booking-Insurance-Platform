<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Inter','Segoe UI',sans-serif">
  <defs><filter id="shadow1"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter></defs>
  <rect width="1100" height="750" fill="#f5f7fa"/>
  <rect width="1100" height="56" fill="#3f51b5"/>
  <text x="24" y="36" fill="white" font-size="18" font-weight="700">✈ TravelSphere</text>
  <text x="40" y="100" font-size="22" font-weight="700" fill="#1a1a2e">AI Travel Assistant</text>
  <text x="40" y="124" font-size="13" fill="#666">Ask me anything about your travel plans</text>

  <!-- Chat Container -->
  <rect x="40" y="150" rx="24" ry="24" width="760" height="480" fill="white" filter="url(#shadow1)"/>

  <!-- Chat Messages Area -->
  <!-- AI assistant message -->
  <rect x="64" y="170" rx="16" ry="16" width="400" height="60" fill="#f0f2f5"/>
  <text x="80" y="190" fill="#1a1a2e" font-size="10" font-weight="600">TravelSphere AI</text>
  <text x="80" y="210" fill="#333" font-size="11">👋 Hello! I'm your TravelSphere AI assistant. Ask me</text>
  <text x="80" y="226" fill="#333" font-size="11">about destinations, itineraries, or travel tips!</text>

  <!-- User message -->
  <rect x="380" y="250" rx="16" ry="16" width="380" height="60" fill="#3f51b5"/>
  <text x="396" y="270" fill="rgba(255,255,255,0.8)" font-size="10" font-weight="600">You</text>
  <text x="396" y="290" fill="white" font-size="11">Plan a 5-day trip to Kerala with ₹50,000 budget</text>

  <!-- AI response -->
  <rect x="64" y="330" rx="16" ry="16" width="460" height="110" fill="#f0f2f5"/>
  <text x="80" y="350" fill="#1a1a2e" font-size="10" font-weight="600">TravelSphere AI</text>
  <text x="80" y="370" fill="#333" font-size="11">Here's a suggested itinerary:</text>
  <text x="80" y="390" fill="#333" font-size="11">Day 1: Arrive in Kochi. Explore Fort Kochi.</text>
  <text x="80" y="406" fill="#333" font-size="11">Day 2: Drive to Munnar. Tea plantation tour.</text>
  <text x="80" y="422" fill="#333" font-size="11">Day 3: Alleppey backwaters. Houseboat stay.</text>
  <text x="80" y="438" fill="#333" font-size="11">Would you like me to customize this further?</text>

  <!-- Loading dots -->
  <rect x="64" y="458" rx="16" ry="16" width="70" height="36" fill="#f0f2f5"/>
  <circle cx="85" cy="476" r="5" fill="#3f51b5" opacity="0.4"/>
  <circle cx="100" cy="476" r="5" fill="#3f51b5" opacity="0.6"/>
  <circle cx="115" cy="476" r="5" fill="#3f51b5"/>

  <!-- Chat Input -->
  <rect x="40" y="642" rx="24" ry="24" width="760" height="60" fill="white" filter="url(#shadow1)"/>
  <rect x="64" y="656" rx="8" ry="8" width="620" height="32" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="676" fill="#bbb" font-size="12">Ask about destinations, itineraries, tips...</text>
  <rect x="730" y="654" rx="20" ry="20" width="48" height="36" fill="#3f51b5"/>
  <text x="754" y="677" fill="white" font-size="14" text-anchor="middle">➤</text>

  <!-- Quick prompts sidebar -->
  <rect x="830" y="150" rx="16" ry="16" width="230" height="200" fill="white" filter="url(#shadow1)"/>
  <text x="848" y="180" font-size="14" font-weight="600" fill="#1a1a2e">Try asking:</text>
  <rect x="848" y="196" rx="16" ry="16" width="196" height="32" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="860" y="216" fill="#555" font-size="11">🌴 Kerala Trip</text>
  <rect x="848" y="236" rx="16" ry="16" width="196" height="32" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="860" y="256" fill="#555" font-size="11">🏰 Europe</text>
  <rect x="848" y="276" rx="16" ry="16" width="196" height="32" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="860" y="296" fill="#555" font-size="11">🛡 Insurance</text>
  <rect x="848" y="316" rx="16" ry="16" width="196" height="32" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="860" y="336" fill="#555" font-size="11">📄 Documents</text>
</svg>
