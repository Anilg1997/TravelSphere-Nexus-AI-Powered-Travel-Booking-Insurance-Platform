  <text x="860" y="585" fill="#1565c0" font-size="11" font-weight="600" text-anchor="middle">Premium</text>

  <!-- Row 1 -->
  <text x="70" y="618" fill="#555" font-size="11">Medical Emergencies</text>
  <text x="420" y="618" fill="#666" font-size="11" text-anchor="middle">✓</text>
  <text x="640" y="618" fill="#666" font-size="11" text-anchor="middle">✓</text>
  <text x="860" y="618" fill="#666" font-size="11" text-anchor="middle">✓</text>

  <!-- Row 2 -->
  <text x="70" y="642" fill="#555" font-size="11">Baggage Loss/Theft</text>
  <text x="420" y="642" fill="#999" font-size="11" text-anchor="middle">✗</text>
  <text x="640" y="642" fill="#666" font-size="11" text-anchor="middle">✓</text>
  <text x="860" y="642" fill="#666" font-size="11" text-anchor="middle">✓</text>

  <!-- Row 3 -->
  <text x="70" y="666" fill="#555" font-size="11">Trip Cancellation</text>
  <text x="420" y="666" fill="#999" font-size="11" text-anchor="middle">✗</text>
  <text x="640" y="666" fill="#666" font-size="11" text-anchor="middle">✓</text>
  <text x="860" y="666" fill="#666" font-size="11" text-anchor="middle">✓</text>

  <!-- Row 4 -->
  <text x="70" y="690" fill="#555" font-size="11">Flight Delay Compensation</text>
  <text x="420" y="690" fill="#999" font-size="11" text-anchor="middle">✗</text>
  <text x="640" y="690" fill="#666" font-size="11" text-anchor="middle">✓</text>
  <text x="860" y="690" fill="#666" font-size="11" text-anchor="middle">✓</text>

  <!-- Row 5 -->
  <text x="70" y="714" fill="#555" font-size="11">Adventure Sports Coverage</text>
  <text x="420" y="714" fill="#999" font-size="11" text-anchor="middle">✗</text>
  <text x="640" y="714" fill="#999" font-size="11" text-anchor="middle">✗</text>
  <text x="860" y="714" fill="#666" font-size="11" text-anchor="middle">✓</text>
